<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Analyzer AI Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0f0f23;color:#e0e0e0;min-height:100vh}
        .header{background:linear-gradient(135deg,#1a1a3e,#16213e);padding:20px 30px;border-bottom:2px solid #0ea5e9;display:flex;justify-content:space-between;align-items:center}
        .header h1{font-size:1.5em;color:#0ea5e9}
        .header .status{color:#10b981;font-size:.9em}
        .container{max-width:1400px;margin:0 auto;padding:20px}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px}
        .card{background:linear-gradient(145deg,#16213e,#1a1a3e);padding:24px;border-radius:12px;border:1px solid #2a2a5a}
        .card h3{font-size:.85em;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
        .card .value{font-size:2.2em;font-weight:bold}
        .card.critical .value{color:#ef4444}
        .card.warning .value{color:#f59e0b}
        .card.info .value{color:#0ea5e9}
        .card.success .value{color:#10b981}
        .charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px}
        .chart-box{background:#16213e;border-radius:12px;padding:20px;border:1px solid #2a2a5a}
        .chart-box h3{margin-bottom:15px;color:#94a3b8}
        .feed{background:#16213e;border-radius:12px;padding:20px;border:1px solid #2a2a5a;margin-bottom:30px}
        .feed h3{margin-bottom:15px;color:#94a3b8}
        .row{display:grid;grid-template-columns:100px 140px 160px 1fr;gap:15px;padding:12px 15px;border-bottom:1px solid #2a2a4a;font-size:.9em;align-items:center}
        .badge{padding:4px 10px;border-radius:6px;font-weight:bold;font-size:.75em;text-align:center}
        .badge-CRITICAL{background:#7f1d1d;color:#fca5a5}
        .badge-HIGH{background:#78350f;color:#fbbf24}
        .badge-MEDIUM{background:#1e3a5f;color:#7dd3fc}
        .badge-LOW{background:#14532d;color:#86efac}
        .ip-table{background:#16213e;border-radius:12px;padding:20px;border:1px solid #2a2a5a;margin-bottom:30px}
        .ip-row{display:flex;justify-content:space-between;padding:10px 15px;border-bottom:1px solid #2a2a4a}
        .ip-count{color:#ef4444;font-weight:bold}
        .loading{text-align:center;padding:40px;color:#64748b}
        @media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.charts{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="header"><h1>&#128737; Log Analyzer AI Dashboard</h1><div class="status" id="status">Connecting...</div></div>
<div class="container">
    <div class="stats">
        <div class="card info"><h3>Lines Processed</h3><div class="value" id="total-lines">0</div></div>
        <div class="card critical"><h3>Total Threats</h3><div class="value" id="total-threats">0</div></div>
        <div class="card warning"><h3>Critical</h3><div class="value" id="critical">0</div></div>
        <div class="card success"><h3>Attacker IPs</h3><div class="value" id="ips">0</div></div>
    </div>
    <div class="charts">
        <div class="chart-box"><h3>Threats by Type</h3><canvas id="typeChart"></canvas></div>
        <div class="chart-box"><h3>Severity</h3><canvas id="sevChart"></canvas></div>
    </div>
    <div class="ip-table"><h3>Top Attacker IPs</h3><div id="top-ips"><div class="loading">Loading...</div></div></div>
    <div class="feed"><h3>Recent Threats</h3><div id="feed"><div class="loading">Loading...</div></div></div>
</div>
<script>
const C={CRITICAL:'#ef4444',HIGH:'#f59e0b',MEDIUM:'#0ea5e9',LOW:'#10b981',SQL_INJECTION:'#ef4444',BRUTE_FORCE:'#f59e0b',PATH_TRAVERSAL:'#8b5cf6',XSS:'#ec4899',SUSPICIOUS_UA:'#06b6d4'};
let tc=new Chart(document.getElementById('typeChart'),{type:'doughnut',data:{labels:[],datasets:[{data:[],backgroundColor:[]}]},options:{responsive:true,plugins:{legend:{labels:{color:'#e0e0e0'}}}}});
let sc=new Chart(document.getElementById('sevChart'),{type:'bar',data:{labels:['CRITICAL','HIGH','MEDIUM','LOW'],datasets:[{data:[0,0,0,0],backgroundColor:['#ef4444','#f59e0b','#0ea5e9','#10b981']}]},options:{responsive:true,scales:{y:{ticks:{color:'#94a3b8'},grid:{color:'#2a2a5a'}},x:{ticks:{color:'#94a3b8'},grid:{color:'#2a2a5a'}}},plugins:{legend:{display:false}}}});
async function refresh(){try{const r=await fetch('/api/stats'),d=await r.json();document.getElementById('total-lines').textContent=d.total_lines.toLocaleString();document.getElementById('total-threats').textContent=d.total_threats.toLocaleString();document.getElementById('critical').textContent=(d.severity_breakdown.CRITICAL||0).toLocaleString();document.getElementById('ips').textContent=d.top_ips.length;const t=Object.entries(d.threat_type_breakdown);tc.data.labels=t.map(x=>x[0]);tc.data.datasets[0].data=t.map(x=>x[1]);tc.data.datasets[0].backgroundColor=t.map(x=>C[x[0]]||'#64748b');tc.update();sc.data.datasets[0].data=[d.severity_breakdown.CRITICAL||0,d.severity_breakdown.HIGH||0,d.severity_breakdown.MEDIUM||0,d.severity_breakdown.LOW||0];sc.update();document.getElementById('top-ips').innerHTML=d.top_ips.length?d.top_ips.map(i=>'<div class="ip-row"><span>'+i.ip+'</span><span class="ip-count">'+i.count+' threats</span></div>').join(''):'<div class="loading">No threats yet</div>';const th=d.recent_threats.slice(-20).reverse();document.getElementById('feed').innerHTML=th.length?th.map(t=>'<div class="row"><span class="badge badge-'+t.severity+'">'+t.severity+'</span><span>'+t.threat_type+'</span><span>'+t.source_ip+'</span><span>'+(t.description||'').substring(0,80)+'</span></div>').join(''):'<div class="loading">No threats yet</div>';document.getElementById('status').innerHTML='&#9679; Live';document.getElementById('status').style.color='#10b981';}catch(e){document.getElementById('status').innerHTML='&#9679; Error';document.getElementById('status').style.color='#ef4444';}}
refresh();setInterval(refresh,5000);
</script>
</body>
</html>
